title: "Watsonx Agentic AI Course"
description: "A comprehensive course on building AI agents with Watsonx - from no-code to pro-code solutions"
baseurl: "/"
url: "https://nicknochnack.github.io"

# Build settings
markdown: kramdown
theme: just-the-docs

# Just the Docs theme configuration
color_scheme: nil
search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Navigation structure
nav_sort: case_insensitive

# Aux links for the upper right navigation
aux_links:
  "Course on GitHub":
    - "//github.com/nicknochnack/6-08-2025-DTA"

# Makes Aux links open in a new tab. Default is false
aux_links_new_tab: true

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .gitignore 