<svg viewBox="0 0 880 720" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5f6368"/>
    </marker>
    <marker id="arrowTool" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#137333"/>
    </marker>
  </defs>

  <!-- Trigger -->
  <rect x="165" y="26" width="470" height="44" rx="22" fill="#fff4e5" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="53" text-anchor="middle" font-size="14" font-weight="700" fill="#7a4a00">TRIGGER — Minister's office requests a brief</text>
  <text x="400" y="90" text-anchor="middle" font-size="12.5" font-style="italic" fill="#9a6a14">"Brief the Minister on the healthcare workforce shortage ahead of the AMA meeting"</text>

  <line x1="400" y1="104" x2="400" y2="138" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Orchestrator -->
  <rect x="210" y="140" width="380" height="66" rx="10" fill="#e8f0fe" stroke="#1a73e8" stroke-width="2"/>
  <text x="400" y="168" text-anchor="middle" font-size="15" font-weight="700" fill="#174ea6">Orchestrator Agent</text>
  <text x="400" y="188" text-anchor="middle" font-size="12" fill="#174ea6">watsonx Orchestrate — decomposes the request, sequences the two sub-agents</text>

  <line x1="400" y1="206" x2="400" y2="248" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="416" y="232" font-size="12" font-weight="600" fill="#5f6368">① get statistics</text>

  <!-- Statistics Agent -->
  <rect x="210" y="250" width="380" height="62" rx="10" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.5"/>
  <text x="400" y="276" text-anchor="middle" font-size="14" font-weight="700" fill="#202124">Statistics Agent</text>
  <text x="400" y="295" text-anchor="middle" font-size="12" fill="#3c4043">calls the tool, formats metrics into citation-ready text</text>

  <!-- API callout (right) -->
  <rect x="630" y="254" width="220" height="54" rx="8" fill="#e6f4ea" stroke="#137333" stroke-width="1.5"/>
  <text x="740" y="277" text-anchor="middle" font-size="13" font-weight="600" fill="#0d652d">Healthcare Workforce API</text>
  <text x="740" y="295" text-anchor="middle" font-size="11" fill="#0d652d">OpenAPI tool → roles + data</text>
  <line x1="590" y1="278" x2="626" y2="278" stroke="#137333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="626" y1="285" x2="592" y2="285" stroke="#137333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <line x1="400" y1="312" x2="400" y2="354" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="416" y="338" font-size="12" font-weight="600" fill="#5f6368">② write brief</text>

  <!-- Writing Agent -->
  <rect x="210" y="356" width="380" height="62" rx="10" fill="#f1f3f4" stroke="#5f6368" stroke-width="1.5"/>
  <text x="400" y="382" text-anchor="middle" font-size="14" font-weight="700" fill="#202124">Writing Agent</text>
  <text x="400" y="401" text-anchor="middle" font-size="12" fill="#3c4043">drafts the brief in the standard format (watsonx.ai)</text>

  <!-- KB callout (right) -->
  <rect x="630" y="360" width="220" height="54" rx="8" fill="#e6f4ea" stroke="#137333" stroke-width="1.5"/>
  <text x="740" y="383" text-anchor="middle" font-size="13" font-weight="600" fill="#0d652d">Brief Format</text>
  <text x="740" y="401" text-anchor="middle" font-size="11" fill="#0d652d">knowledge base (format rules)</text>
  <line x1="590" y1="387" x2="626" y2="387" stroke="#137333" stroke-width="1.5" marker-end="url(#arrowTool)"/>

  <line x1="400" y1="418" x2="400" y2="460" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="230" y="462" width="340" height="60" rx="10" fill="#d2e3fc" stroke="#1a73e8" stroke-width="2"/>
  <text x="400" y="488" text-anchor="middle" font-size="14" font-weight="700" fill="#174ea6">Ministerial brief ready</text>
  <text x="400" y="507" text-anchor="middle" font-size="12" fill="#174ea6">standard format, statistics cited — routed to human gate</text>

  <!-- Human gate -->
  <line x1="400" y1="522" x2="400" y2="558" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="225" y="560" width="350" height="46" rx="23" fill="#fff4e5" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="588" text-anchor="middle" font-size="13" font-weight="600" fill="#7a4a00">👤 Human reviews &amp; signs off (the only gate)</text>

  <!-- Caption -->
  <text x="400" y="650" text-anchor="middle" font-size="12" font-style="italic" fill="#5f6368">Three agents coordinate from a single trigger. The human only enters at the final gate —</text>
  <text x="400" y="668" text-anchor="middle" font-size="12" font-style="italic" fill="#5f6368">that autonomy between trigger and gate is what makes this an agentic system.</text>
</svg>
